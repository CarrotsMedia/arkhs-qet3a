<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arkhs Qet3a — Compare PC parts prices in real-time across top Egyptian stores like Sigma Computer and El Badr Group.">
    <title>Arkhs Qet3a | Live PC Parts Price Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Arkhs <span class="gradient-text">Qet3a</span></h1>
        <p>Real-time price comparison across Egypt's top PC stores</p>
        <div class="live-badge">LIVE SEARCH ENGINE</div>
    </header>

    <div class="container">
        <main>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search for RTX 4070, Core i5, DDR5 RAM..." autocomplete="off">
                <button id="searchBtn">🔍 Search Now</button>
            </div>
            
            <div class="dashboard-stats" id="stats">
                <span id="resultText">Popular Suggestions</span>
            </div>

            <!-- Loader -->
            <div id="loader" class="loader-container" style="display:none;">
                <div class="spinner"></div>
                <p>Scanning Sigma & El Badr live…<br>This may take up to 15 seconds.</p>
            </div>

            <div class="grid" id="productsGrid">
                <!-- Products populated dynamically -->
            </div>
        </main>
    </div>

    <!-- Product Detail + Price Compare Modal -->
    <div id="priceModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalBody">
                <!-- Dynamic: Product Detail or Merchants List -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
